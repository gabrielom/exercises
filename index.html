<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Exercises</title>
  <meta name="description" content="Exercise tracker — reps, timers, and the 2-hour Corpo stretching routine.">
  <meta name="theme-color" content="#f6f6f1" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1b1c16" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Exercises">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <main id="view"></main>

  <nav class="tabbar" aria-label="Sections">
    <button data-tab="exercises" class="on" aria-label="Exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="8" height="10" rx="2.5"></rect>
        <rect x="13" y="3" width="8" height="6" rx="2.5"></rect>
        <rect x="13" y="11" width="8" height="10" rx="2.5"></rect>
        <rect x="3" y="15" width="8" height="6" rx="2.5"></rect>
      </svg>
      <span>Exercises</span>
    </button>
    <button data-tab="routine" aria-label="Routine">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M10 8.5l5 3.5-5 3.5z" fill="currentColor" stroke="none"></path>
      </svg>
      <span>Routine</span>
    </button>
    <button data-tab="history" aria-label="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M4 6h16M4 12h16M4 18h10"></path>
      </svg>
      <span>History</span>
    </button>
  </nav>

  <div id="player" class="player-overlay" hidden></div>
  <div id="toast" role="status"></div>
</body>
</html>
